<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>醫護後台 — 脊椎追蹤系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
  .navbar { background: linear-gradient(135deg, #1a73e8, #0d47a1); }
  .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .stat-card { border-left: 4px solid; }
  .stat-card.blue   { border-color: #1a73e8; }
  .stat-card.green  { border-color: #34a853; }
  .stat-card.orange { border-color: #fbbc04; }
  .stat-card.red    { border-color: #ea4335; }
  .badge-pending  { background: #fff3cd; color: #856404; border-radius: 8px; padding: 3px 10px; font-size:.8rem; }
  .badge-approved { background: #d1e7dd; color: #0f5132; border-radius: 8px; padding: 3px 10px; font-size:.8rem; }
  .vas-pill { display:inline-block; width:28px; height:28px; border-radius:50%;
    line-height:28px; text-align:center; font-size:.8rem; font-weight:600; color:#fff; }
  .vas-0  { background:#34a853; }
  .vas-1  { background:#4caf50; }
  .vas-2  { background:#8bc34a; }
  .vas-3  { background:#cddc39; color:#333; }
  .vas-4  { background:#ffeb3b; color:#333; }
  .vas-5  { background:#ffc107; color:#333; }
  .vas-6  { background:#ff9800; }
  .vas-7  { background:#ff5722; }
  .vas-8  { background:#f44336; }
  .vas-9  { background:#e53935; }
  .vas-10 { background:#b71c1c; }
  .pct-bar { height:6px; border-radius:3px; background:#e9ecef; }
  .pct-fill { height:100%; border-radius:3px; transition: width .4s; }
  .section-title { font-size:1rem; font-weight:700; color:#1a73e8; border-bottom:2px solid #1a73e8; padding-bottom:6px; margin-bottom:16px; }
  .raw-msg { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:.85rem; color:#555; }
  .spinner-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .action-btn { font-size:.78rem; padding:3px 10px; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <span class="navbar-brand fw-bold"><i class="bi bi-hospital me-2"></i>脊椎追蹤系統</span>
  <div class="d-flex gap-2">
    <span class="text-white-50 small align-self-center">醫護後台</span>
    <a href="?page=analytics" class="btn btn-outline-light btn-sm">
      <i class="bi bi-bar-chart-line me-1"></i>分析儀表板
    </a>
  </div>
</nav>

<!-- Loading -->
<div class="spinner-overlay" id="loadingOverlay">
  <div class="text-center">
    <div class="spinner-border text-primary mb-2"></div>
    <div class="text-muted small">載入資料中…</div>
  </div>
</div>

<div class="container-fluid py-4 px-4" id="mainContent" style="display:none">

  <!-- 統計卡片 -->
  <div class="row g-3 mb-4" id="statCards">
    <div class="col-6 col-md-3">
      <div class="card stat-card blue p-3">
        <div class="text-muted small mb-1"><i class="bi bi-people me-1"></i>總病患數</div>
        <div class="fs-3 fw-bold text-primary" id="statTotal">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card green p-3">
        <div class="text-muted small mb-1"><i class="bi bi-activity me-1"></i>追蹤中</div>
        <div class="fs-3 fw-bold text-success" id="statActive">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card orange p-3">
        <div class="text-muted small mb-1"><i class="bi bi-percent me-1"></i>平均完整度</div>
        <div class="fs-3 fw-bold text-warning" id="statPct">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card red p-3">
        <div class="text-muted small mb-1"><i class="bi bi-clock-history me-1"></i>待確認</div>
        <div class="fs-3 fw-bold text-danger" id="statPending">—</div>
      </div>
    </div>
  </div>

  <!-- AI 待確認區 -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title mb-0">AI 暫存待確認區</div>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadDashboard()">
          <i class="bi bi-arrow-clockwise me-1"></i>重新整理
        </button>
      </div>
      <div id="pendingEmpty" class="text-center text-muted py-4" style="display:none">
        <i class="bi bi-check-circle fs-2 text-success d-block mb-2"></i>
        目前無待確認記錄
      </div>
      <div class="table-responsive" id="pendingTableWrap">
        <table class="table table-hover align-middle mb-0" id="pendingTable">
          <thead class="table-light">
            <tr>
              <th>研究編號</th>
              <th>原始訊息</th>
              <th>AI解讀 背/腿</th>
              <th>AI摘要</th>
              <th>解析時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="pendingBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 病患追蹤列表 -->
  <div class="card">
    <div class="card-body">
      <div class="section-title">病患追蹤狀態</div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>研究編號</th>
              <th>手術</th>
              <th>Cage</th>
              <th>術後天數</th>
              <th>Line 狀態</th>
              <th>最後VAS 背/腿</th>
              <th>追蹤完整度</th>
            </tr>
          </thead>
          <tbody id="patientBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9000">
  <div id="toastEl" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
var toastEl = null;

function showToast(msg, type) {
  var el = document.getElementById('toastEl');
  el.className = 'toast align-items-center text-white border-0 bg-' + (type || 'success');
  document.getElementById('toastMsg').textContent = msg;
  if (!toastEl) toastEl = new bootstrap.Toast(el, { delay: 3000 });
  toastEl.show();
}

function vasClass(v) {
  if (v === '' || v === null || v === undefined || isNaN(v)) return '';
  return 'vas-pill vas-' + Math.min(10, Math.max(0, Math.round(v)));
}

function lineStatusBadge(s) {
  var map = { active: 'success', blocked: 'danger', unbound: 'secondary' };
  var label = { active: '追蹤中', blocked: '已封鎖', unbound: '未綁定' };
  return '<span class="badge bg-' + (map[s]||'secondary') + '">' + (label[s]||s) + '</span>';
}

function loadDashboard() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(data) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      if (!data) { showToast('伺服器回傳空資料，請確認分頁已初始化', 'danger'); return; }
      renderStats(data.summary  || { totalPatients:0, activePatients:0, avgCompleteness:0, pendingReview:0 });
      renderPending(data.pending   || []);
      renderPatients(data.patients || []);
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      showToast('載入失敗：' + (err.message || err), 'danger');
    })
    .getDashboardData();
}

function renderStats(s) {
  document.getElementById('statTotal').textContent   = s.totalPatients;
  document.getElementById('statActive').textContent  = s.activePatients;
  document.getElementById('statPct').textContent     = s.avgCompleteness + '%';
  document.getElementById('statPending').textContent = s.pendingReview;
  if (s.pendingReview > 0) {
    document.getElementById('statPending').classList.add('text-danger');
  }
}

function renderPending(records) {
  var tbody = document.getElementById('pendingBody');
  tbody.innerHTML = '';

  if (!records || records.length === 0) {
    document.getElementById('pendingTableWrap').style.display = 'none';
    document.getElementById('pendingEmpty').style.display = 'block';
    return;
  }
  document.getElementById('pendingTableWrap').style.display = 'block';
  document.getElementById('pendingEmpty').style.display = 'none';

  records.forEach(function(r) {
    var vb = r.aiVasBack !== '' ? r.aiVasBack : '?';
    var vl = r.aiVasLeg  !== '' ? r.aiVasLeg  : '?';
    var row = '<tr id="row-' + r.rowIndex + '">' +
      '<td><strong>' + r.researchId + '</strong></td>' +
      '<td><div class="raw-msg" title="' + escHtml(r.rawMessage) + '">' + escHtml(r.rawMessage) + '</div></td>' +
      '<td>' +
        '<span class="' + vasClass(r.aiVasBack) + '">' + vb + '</span> ' +
        '<span class="text-muted small">/ </span>' +
        '<span class="' + vasClass(r.aiVasLeg)  + '">' + vl + '</span>' +
      '</td>' +
      '<td class="small">' + escHtml(r.aiSummary) + '</td>' +
      '<td class="small text-muted">' + r.aiParsedAt + '</td>' +
      '<td>' +
        '<button class="btn btn-success action-btn me-1" onclick="doApprove(' + r.rowIndex + ')">' +
          '<i class="bi bi-check-lg"></i> 核准</button>' +
        '<button class="btn btn-outline-danger action-btn" onclick="doReject(' + r.rowIndex + ')">' +
          '<i class="bi bi-x-lg"></i> 拒絕</button>' +
      '</td>' +
    '</tr>';
    tbody.insertAdjacentHTML('beforeend', row);
  });
}

function renderPatients(patients) {
  var tbody = document.getElementById('patientBody');
  tbody.innerHTML = '';
  if (!patients || patients.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">尚無病患資料</td></tr>';
    return;
  }
  patients.forEach(function(p) {
    var pctColor = p.pct >= 80 ? '#34a853' : p.pct >= 50 ? '#fbbc04' : '#ea4335';
    var row = '<tr>' +
      '<td><strong>' + p.researchId + '</strong><br><span class="text-muted small">' + p.opDate + '</span></td>' +
      '<td class="small">' + (p.opName||'-') + '</td>' +
      '<td class="small">' + (p.cageCode||'-') + '</td>' +
      '<td><span class="badge bg-light text-dark border">D+' + p.daysPostOp + '</span></td>' +
      '<td>' + lineStatusBadge(p.lineStatus) + '</td>' +
      '<td>' +
        '<span class="' + vasClass(p.lastVasBack) + '">' + p.lastVasBack + '</span>' +
        '<span class="text-muted mx-1">/</span>' +
        '<span class="' + vasClass(p.lastVasLeg) + '">' + p.lastVasLeg + '</span>' +
        (p.lastDays !== '-' ? '<span class="text-muted ms-1 small">D' + p.lastDays + '</span>' : '') +
      '</td>' +
      '<td style="min-width:120px">' +
        '<div class="d-flex align-items-center gap-2">' +
          '<div class="pct-bar flex-grow-1"><div class="pct-fill" style="width:' + p.pct + '%;background:' + pctColor + '"></div></div>' +
          '<span class="small fw-bold" style="color:' + pctColor + '">' + p.pct + '%</span>' +
        '</div>' +
        '<div class="text-muted" style="font-size:.72rem">' + p.actual + '/' + p.expected + ' 次</div>' +
      '</td>' +
    '</tr>';
    tbody.insertAdjacentHTML('beforeend', row);
  });
}

function doApprove(rowIndex) {
  var btn = document.querySelector('#row-' + rowIndex + ' button:first-child');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; }
  google.script.run
    .withSuccessHandler(function() {
      var row = document.getElementById('row-' + rowIndex);
      if (row) row.style.display = 'none';
      showToast('已核准並移入追蹤日誌 ✅', 'success');
      updatePendingCount(-1);
    })
    .withFailureHandler(function(err) {
      showToast('操作失敗：' + err.message, 'danger');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i> 核准'; }
    })
    .approveRecordByRow(rowIndex);
}

function doReject(rowIndex) {
  if (!confirm('確定拒絕這筆記錄？')) return;
  google.script.run
    .withSuccessHandler(function() {
      var row = document.getElementById('row-' + rowIndex);
      if (row) row.style.display = 'none';
      showToast('已拒絕此記錄', 'warning');
      updatePendingCount(-1);
    })
    .withFailureHandler(function(err) {
      showToast('操作失敗：' + err.message, 'danger');
    })
    .rejectRecordByRow(rowIndex);
}

function updatePendingCount(delta) {
  var el = document.getElementById('statPending');
  var n = parseInt(el.textContent) + delta;
  el.textContent = Math.max(0, n);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初始載入
loadDashboard();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 分析儀表板 — 脊椎追蹤系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  body { background:#f0f4f8; font-family:'Segoe UI',sans-serif; }
  .navbar { background:linear-gradient(135deg,#1a73e8,#0d47a1); }
  .card { border:none; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .stat-card { border-left:4px solid; }
  .stat-card.blue   { border-color:#1a73e8; }
  .stat-card.green  { border-color:#34a853; }
  .stat-card.orange { border-color:#fbbc04; }
  .stat-card.red    { border-color:#ea4335; }
  .section-title { font-size:1rem; font-weight:700; color:#1a73e8; border-bottom:2px solid #1a73e8; padding-bottom:6px; margin-bottom:16px; }
  .warning-text { color:#ea4335; font-size:.75rem; }
  .spinner-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .pct-bar { height:8px; border-radius:4px; background:#e9ecef; }
  .pct-fill { height:100%; border-radius:4px; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <span class="navbar-brand fw-bold"><i class="bi bi-bar-chart-line me-2"></i>脊椎追蹤系統</span>
  <div class="d-flex gap-2">
    <span class="text-white-50 small align-self-center">AI 分析儀表板</span>
    <a href="?page=dashboard" class="btn btn-outline-light btn-sm">
      <i class="bi bi-house me-1"></i>醫護後台
    </a>
    <button class="btn btn-outline-light btn-sm" onclick="loadAnalytics()">
      <i class="bi bi-arrow-clockwise me-1"></i>重新整理
    </button>
  </div>
</nav>

<!-- Loading -->
<div class="spinner-overlay" id="loadingOverlay">
  <div class="text-center">
    <div class="spinner-border text-primary mb-2"></div>
    <div class="text-muted small">分析資料中…</div>
  </div>
</div>

<div class="container-fluid py-4 px-4" id="mainContent" style="display:none">

  <!-- 統計摘要卡片 -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card stat-card blue p-3">
        <div class="text-muted small mb-1"><i class="bi bi-people me-1"></i>總病患數</div>
        <div class="fs-3 fw-bold text-primary" id="statTotal">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card green p-3">
        <div class="text-muted small mb-1"><i class="bi bi-activity me-1"></i>追蹤中</div>
        <div class="fs-3 fw-bold text-success" id="statActive">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card orange p-3">
        <div class="text-muted small mb-1"><i class="bi bi-percent me-1"></i>平均完整度</div>
        <div class="fs-3 fw-bold text-warning" id="statPct">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card red p-3">
        <div class="text-muted small mb-1"><i class="bi bi-clock-history me-1"></i>待確認</div>
        <div class="fs-3 fw-bold text-danger" id="statPending">—</div>
      </div>
    </div>
  </div>

  <!-- 圖表區 -->
  <div class="row g-4 mb-4">
    <!-- 耗材 VAS 改善比較 -->
    <div class="col-md-6">
      <div class="card p-3 h-100">
        <div class="section-title">耗材效益比較（VAS 改善分數）</div>
        <div style="position:relative; height:260px">
          <canvas id="cageChart"></canvas>
        </div>
        <div id="cageWarning" class="warning-text mt-2"></div>
      </div>
    </div>
    <!-- 手術方式 VAS 趨勢 -->
    <div class="col-md-6">
      <div class="card p-3 h-100">
        <div class="section-title">手術方式 VAS 恢復趨勢</div>
        <div style="position:relative; height:260px">
          <canvas id="opChart"></canvas>
        </div>
        <div id="opWarning" class="warning-text mt-2"></div>
      </div>
    </div>
  </div>

  <!-- 追蹤完整度 -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title mb-0">追蹤完整度</div>
        <button class="btn btn-sm btn-success" onclick="doExportCsv()">
          <i class="bi bi-download me-1"></i>匯出 CSV
        </button>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>研究編號</th>
              <th>應填次數</th>
              <th>實填次數</th>
              <th>完整度</th>
              <th>連續未回覆</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="completenessBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 耗材明細表 -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="section-title">耗材效益明細</div>
      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Cage 代碼</th>
              <th>樣本數</th>
              <th>術前 VAS</th>
              <th>術後14天 VAS</th>
              <th>改善分數</th>
              <th>改善率</th>
              <th>手術方式</th>
              <th>警示</th>
            </tr>
          </thead>
          <tbody id="cageTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9000">
  <div id="toastEl" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
var cageChartInst = null;
var opChartInst   = null;
var toastEl       = null;

function showToast(msg, type) {
  var el = document.getElementById('toastEl');
  el.className = 'toast align-items-center text-white border-0 bg-' + (type||'success');
  document.getElementById('toastMsg').textContent = msg;
  if (!toastEl) toastEl = new bootstrap.Toast(el, { delay: 3500 });
  toastEl.show();
}

function loadAnalytics() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(data) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      if (!data) { showToast('伺服器回傳空資料，請確認分頁已初始化', 'danger'); return; }
      renderStats(data.summary   || { totalPatients:0, activePatients:0, avgCompleteness:0, pendingReview:0 });
      renderCageChart(data.cageStats    || []);
      renderOpChart(data.opStats        || []);
      renderCompleteness(data.completeness || []);
      renderCageTable(data.cageStats    || []);
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      showToast('載入失敗：' + (err.message || err), 'danger');
    })
    .getAnalyticsData();
}

function renderStats(s) {
  document.getElementById('statTotal').textContent   = s.totalPatients;
  document.getElementById('statActive').textContent  = s.activePatients;
  document.getElementById('statPct').textContent     = s.avgCompleteness + '%';
  document.getElementById('statPending').textContent = s.pendingReview;
}

function renderCageChart(stats) {
  if (!stats || stats.length === 0) return;
  var labels = stats.map(function(r) { return r.cage + ' (n=' + r.n + ')'; });
  var values = stats.map(function(r) { return parseFloat(r.improvement) || 0; });
  var colors = stats.map(function(r) { return r.n < 15 ? '#fbbc04' : '#1a73e8'; });

  if (cageChartInst) cageChartInst.destroy();
  cageChartInst = new Chart(document.getElementById('cageChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'VAS 改善分數',
        data: values,
        backgroundColor: colors,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: '改善分數（分）' } }
      }
    }
  });

  var warnings = stats.filter(function(r){ return r.warning; }).map(function(r){ return r.warning; });
  document.getElementById('cageWarning').innerHTML = warnings.join('<br>');
}

function renderOpChart(stats) {
  if (!stats || stats.length === 0) return;
  var palette = ['#1a73e8','#34a853','#fbbc04','#ea4335','#9c27b0','#00bcd4'];
  var datasets = stats.map(function(r, i) {
    return {
      label: r.opName + ' (n=' + r.n + ')',
      data: [
        parseFloat(r.vas7)  || null,
        parseFloat(r.vas14) || null,
        parseFloat(r.vas28) || null
      ],
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '33',
      tension: 0.3,
      fill: false,
      pointRadius: 5
    };
  });

  if (opChartInst) opChartInst.destroy();
  opChartInst = new Chart(document.getElementById('opChart'), {
    type: 'line',
    data: {
      labels: ['術後第7天','術後第14天','術後第28天'],
      datasets: datasets
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } },
      scales: {
        y: { min: 0, max: 10, title: { display: true, text: 'VAS 平均分' } }
      },
      spanGaps: true
    }
  });

  var warnings = stats.filter(function(r){ return r.warning; }).map(function(r){ return r.warning; });
  document.getElementById('opWarning').innerHTML = warnings.join('<br>');
}

function renderCompleteness(data) {
  var tbody = document.getElementById('completenessBody');
  tbody.innerHTML = '';
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">尚無追蹤資料</td></tr>';
    return;
  }
  data.forEach(function(r) {
    var color = r.pct >= 80 ? '#34a853' : r.pct >= 50 ? '#fbbc04' : '#ea4335';
    var bg    = r.pct >= 80 ? '' : r.pct >= 50 ? 'table-warning' : 'table-danger';
    var missedBadge = r.consecutiveMissed >= 3
      ? '<span class="badge bg-danger">' + r.consecutiveMissed + ' 次</span>'
      : r.consecutiveMissed > 0
        ? '<span class="badge bg-warning text-dark">' + r.consecutiveMissed + ' 次</span>'
        : '<span class="text-muted">0</span>';
    tbody.insertAdjacentHTML('beforeend',
      '<tr class="' + bg + '">' +
      '<td><strong>' + r.researchId + '</strong></td>' +
      '<td>' + r.expected + '</td>' +
      '<td>' + r.actual + '</td>' +
      '<td style="min-width:130px">' +
        '<div class="d-flex align-items-center gap-2">' +
          '<div class="pct-bar flex-grow-1"><div class="pct-fill" style="width:' + r.pct + '%;background:' + color + '"></div></div>' +
          '<span class="small fw-bold" style="color:' + color + '">' + r.pct + '%</span>' +
        '</div>' +
      '</td>' +
      '<td>' + missedBadge + '</td>' +
      '<td>' + r.status + '</td>' +
      '</tr>'
    );
  });
}

function renderCageTable(stats) {
  var tbody = document.getElementById('cageTableBody');
  tbody.innerHTML = '';
  if (!stats || stats.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-3">尚無耗材比較資料</td></tr>';
    return;
  }
  stats.forEach(function(r) {
    var warnHtml = r.warning ? '<span class="warning-text"><i class="bi bi-exclamation-triangle me-1"></i>' + r.warning + '</span>' : '—';
    tbody.insertAdjacentHTML('beforeend',
      '<tr>' +
      '<td><strong>' + r.cage + '</strong></td>' +
      '<td><span class="badge bg-secondary">' + r.n + '</span></td>' +
      '<td>' + r.preVas + '</td>' +
      '<td>' + r.vas14 + '</td>' +
      '<td>' + (r.improvement !== 'N/A' ? '<span class="text-success fw-bold">▲ ' + r.improvement + '</span>' : '—') + '</td>' +
      '<td>' + (r.rate !== 'N/A' ? r.rate : '—') + '</td>' +
      '<td>' + (r.opName||'—') + '</td>' +
      '<td>' + warnHtml + '</td>' +
      '</tr>'
    );
  });
}

function doExportCsv() {
  showToast('匯出中，請稍候…', 'info');
  google.script.run
    .withSuccessHandler(function() {
      showToast('✅ CSV 已匯出至 Google Drive！', 'success');
    })
    .withFailureHandler(function(err) {
      showToast('匯出失敗：' + err.message, 'danger');
    })
    .exportConfirmedCsv();
}

// 初始載入
loadAnalytics();
</script>
</body>
</html>
